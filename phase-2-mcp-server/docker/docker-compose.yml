services:
  mcp_server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      VAULT_PATH: /data/vault
    volumes:
      - ${VAULT_PATH}:/data/vault
      - ${SECRETS_PATH:-./secrets}:/data/secrets
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mcp_server

volumes:
  caddy_data:
  caddy_config:
